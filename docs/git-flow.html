<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Git Flow — Referans Kartı</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C10;--bg2:#0E1419;--bg3:#151C23;--bg4:#1A2230;
  --border:#1E2A38;--border2:#2A3A4E;
  --text:#DDE6F0;--muted:#6B8099;--dim:#3D5166;
  --green:#22C55E;--green-bg:#052010;--green-border:rgba(34,197,94,.25);
  --blue:#38BDF8;--blue-bg:#031520;--blue-border:rgba(56,189,248,.25);
  --amber:#F59E0B;--amber-bg:#1A0F00;
  --purple:#A78BFA;--purple-bg:#120A2E;
  --red:#F87171;--red-bg:#200A0A;--red-border:rgba(248,113,113,.25);
  --orange:#FB923C;--orange-bg:#1C0A00;--orange-border:rgba(251,146,60,.25);
  --tag-yellow:#F0E68C;
  --radius:10px;--radius-lg:14px;
}
html{color:var(--text);font-family:'Cabinet Grotesk',sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;background:radial-gradient(ellipse 90% 60% at 10% 0%,rgba(3,105,161,.28) 0%,transparent 60%),radial-gradient(ellipse 70% 50% at 90% 10%,rgba(109,40,217,.18) 0%,transparent 55%),radial-gradient(ellipse 60% 40% at 50% 90%,rgba(5,150,105,.1) 0%,transparent 60%),#080C10}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(56,189,248,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.018) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse 100% 70% at 50% 0%,black 10%,transparent 90%)}
.glow-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:drift 18s ease-in-out infinite}
.glow-1{width:600px;height:400px;background:radial-gradient(circle,rgba(14,165,233,.18),transparent 70%);top:-100px;left:-150px}
.glow-2{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);top:300px;right:-100px;animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-15px) scale(1.03)}66%{transform:translate(-15px,25px) scale(.97)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
header{position:sticky;top:0;z-index:100;padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,12,16,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#0EA5E9,#22C55E);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;color:#fff;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.logo-text span{color:var(--muted);font-weight:400}
.nav-right{display:flex;align-items:center;gap:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;font-family:'Cabinet Grotesk',sans-serif;font-weight:600;text-decoration:none;transition:border-color .2s,color .2s,background .2s}
.back-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.back-btn svg{flex-shrink:0;transition:transform .2s}
.back-btn:hover svg{transform:translateX(-2px)}
.nav-divider{width:1px;height:18px;background:var(--border)}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.breadcrumb-sep{color:var(--border2);font-size:10px}
.breadcrumb-cur{color:var(--muted)}
.lang-toggle{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px;gap:2px}
.lang-btn{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:3px 10px;border-radius:16px;border:none;cursor:pointer;background:transparent;color:var(--dim);transition:background .15s,color .15s;letter-spacing:.05em}
.lang-btn.active{background:var(--blue);color:#fff}
.hero{position:relative;z-index:1;padding:3.5rem 2rem 2.5rem;max-width:960px;margin:0 auto;width:100%}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);background:var(--blue-bg);border:1px solid rgba(56,189,248,.15);border-radius:20px;padding:4px 14px;margin-bottom:1.25rem}
.hero-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 2s ease-in-out infinite}
.hero h1{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:.5rem}
.hero h1 em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--green);font-weight:400}
.hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:1rem}
.meta-pill{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:600}
.main{position:relative;z-index:1;max-width:960px;margin:0 auto;width:100%;padding:0 2rem 5rem;flex:1}
.sec{display:flex;align-items:center;gap:12px;margin:2.5rem 0 1.1rem}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sec-text{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap}
.pill-master{color:var(--purple);background:var(--purple-bg);border-color:rgba(167,139,250,.3)}
.pill-develop{color:var(--orange);background:var(--orange-bg);border-color:var(--orange-border)}
.pill-tag{color:var(--tag-yellow);background:#1E1A00;border-color:#6B5900;font-size:10px}
.flow-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:2rem;overflow-x:auto;position:relative}
.flow-wrap::before{content:'';position:absolute;inset:0;border-radius:var(--radius-lg);background:linear-gradient(135deg,rgba(56,189,248,.03),transparent 50%,rgba(124,58,237,.03));pointer-events:none}
.flow-svg{display:block;width:100%;min-width:600px}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:2rem}
@media(max-width:640px){.cards{grid-template-columns:1fr}}
.bcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.2rem;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
.bcard:hover{border-color:var(--border2);background:var(--bg3)}
.bcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.bcard-feature::before{background:var(--green)}
.bcard-bugfix::before{background:var(--blue)}
.bcard-hotfix::before{background:var(--red)}
.bcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.bcard-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.bcard-feature .bcard-label{color:var(--green)}
.bcard-bugfix .bcard-label{color:var(--blue)}
.bcard-hotfix .bcard-label{color:var(--red)}
.bcard-icon{font-size:16px}
.bcard-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.flow-line{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:6px;flex-wrap:wrap}
.arrow-sm{color:var(--dim);font-size:11px}
.bcard-ex{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:8px}
.bcard-warn{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:8px 12px;font-size:11.5px;color:var(--red);margin-top:.85rem;line-height:1.5}
.qref{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:2rem}
.qref table{width:100%;border-collapse:collapse;font-size:13px}
.qref thead th{background:var(--bg3);padding:9px 16px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.qref tbody tr{border-bottom:1px solid var(--border)}
.qref tbody tr:last-child{border-bottom:none}
.qref tbody tr:hover{background:rgba(56,189,248,.025)}
.qref tbody td{padding:10px 16px;vertical-align:middle}
.qref code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2rem}
@media(max-width:560px){.check-grid{grid-template-columns:1fr}}
.check-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem;display:flex;align-items:flex-start;gap:.7rem;font-size:12.5px;color:var(--muted);line-height:1.5;transition:border-color .2s}
.check-item:hover{border-color:rgba(248,113,113,.3)}
.check-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--red);color:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;font-weight:700}
.ci-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
@media(max-width:640px){.ci-grid{grid-template-columns:1fr}}
.ci-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem}
.ci-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;display:flex;align-items:center;gap:7px}
.ci-card pre{font-family:'JetBrains Mono',monospace;font-size:11px;color:#7DD3FC;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;overflow-x:auto;line-height:1.75;white-space:pre}
.ci-card p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:.7rem}
.conflict-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.step-row{display:flex;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;align-items:flex-start;transition:border-color .2s}
.step-row:hover{border-color:var(--border2)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:2px;font-family:'JetBrains Mono',monospace}
.step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.step-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:#7DD3FC;background:var(--bg3);border-radius:6px;padding:8px 12px;display:block;margin-top:6px;white-space:pre;overflow-x:auto}
.note-bar{background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:var(--radius);padding:.9rem 1.1rem;font-size:12.5px;color:#FCA5A5;line-height:1.7;display:flex;gap:.6rem;align-items:flex-start;margin-bottom:2rem}
.tip-bar{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:.9rem 1.1rem;font-size:12.5px;color:#86EFAC;line-height:1.7;display:flex;gap:.6rem;align-items:flex-start;margin-bottom:2rem}
footer{position:relative;z-index:1;background:var(--bg2);border-top:1px solid var(--border);padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.footer-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:blink 2s ease-in-out infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hero-eyebrow{animation:fadeUp .4s ease both}
.hero h1{animation:fadeUp .4s .07s ease both}
.hero-meta{animation:fadeUp .4s .14s ease both}
@media(max-width:640px){header,footer{padding-left:1rem;padding-right:1rem}.hero,.main{padding-left:1rem;padding-right:1rem}}
</style>
</head>
<body>
<div class="glow-orb glow-1"></div>
<div class="glow-orb glow-2"></div>

<header>
  <a href="../index.html" class="logo-row">
    <div class="logo-mark">me</div>
    <span class="logo-text">Notlarım <span>/ Kişisel</span></span>
  </a>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="tr">TR</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <span class="nav-divider"></span>
    <a href="../index.html" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="back-label">Ana Sayfa</span>
    </a>
    <span class="nav-divider"></span>
    <div class="breadcrumb">
      <span id="breadcrumb-parent">Teknik</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-cur">Git Flow</span>
    </div>
  </div>
</header>

<div class="hero" id="hero"></div>
<main class="main" id="main"></main>

<footer>
  <span><span class="footer-dot"></span><span id="footer-label">Git Flow Referans Kartı · v1.0</span></span>
  <span>feature / bugfix / hotfix · GitLab CI/CD</span>
</footer>

<script>
const COLOR = {
  green:  'var(--green)', blue: 'var(--blue)', red: 'var(--red)',
  amber:  'var(--amber)', purple: 'var(--purple)', muted: 'var(--muted)'
};

let currentLang = 'tr';
let allData = null;

function pill(type) {
  return `<span class="pill ${type==='master'?'pill-master':'pill-develop'}">${type}</span>`;
}
function sec(color, label) {
  return `<div class="sec"><span class="sec-dot" style="background:${color}"></span><span class="sec-text">${label}</span><span class="sec-line"></span></div>`;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHero(d) {
  const m = d.meta;
  const badges = m.badges.map(b =>
    `<span class="meta-pill" style="color:var(--blue);background:var(--blue-bg);border-color:var(--blue-border)">${b}</span>`
  ).join('');
  document.getElementById('hero').innerHTML = `
    <div class="hero-eyebrow">${m.eyebrow}</div>
    <h1>${m.title}<br><em>${m.titleItalic}</em></h1>
    <div class="hero-meta">
      <span class="meta-pill" style="color:var(--green);background:var(--green-bg);border-color:var(--green-border)">● ${m.liveLabel}</span>
      <span class="meta-pill" style="color:var(--muted);background:var(--bg3);border-color:var(--border)">${m.date}</span>
      ${badges}
    </div>`;
}

function renderBranches(branches) {
  return '<div class="cards">' + branches.map(b => {
    const flowTo = b.type === 'hotfix'
      ? `<div class="flow-line">${pill('master')}<span class="arrow-sm">→</span><span style="font-size:11px;color:var(--muted)">branch</span><span class="arrow-sm">→</span>${pill('master')}</div>
         <div class="flow-line"><span style="font-size:10px;color:var(--dim)">${b.flowExtra}</span></div>`
      : `<div class="flow-line">${pill(b.flowFrom)}<span class="arrow-sm">→</span><span style="font-size:11px;color:var(--muted)">branch</span><span class="arrow-sm">→</span>${pill(b.flowTo)}</div>`;
    const exColor = b.type==='feature'?'var(--green)':b.type==='bugfix'?'var(--blue)':'var(--red)';
    const warn = b.warning ? `<div class="bcard-warn">⚠ ${b.warning}</div>` : '';
    return `<div class="bcard bcard-${b.type}">
      <div class="bcard-head"><span class="bcard-label">${b.label}</span><span class="bcard-icon">${b.icon}</span></div>
      <p class="bcard-desc">${b.description}</p>${flowTo}
      <div class="bcard-ex" style="color:${exColor}">${b.example}</div>${warn}
    </div>`;
  }).join('') + '</div>';
}

function renderQuickref(qr) {
  const ths = qr.headers.map(h => `<th>${h}</th>`).join('');
  const trs = qr.rows.map(r => {
    const hedefPills = r.hedef.includes('+') ? `${pill('master')} + ${pill('develop')}` : pill(r.hedef);
    const tag = r.tag ? `<span class="pill pill-tag">${r.tag}</span>` : `<span style="color:var(--dim)">—</span>`;
    return `<tr>
      <td style="color:${COLOR[r.durumColor]};font-weight:600">${r.durum}</td>
      <td><code>${r.branch}</code></td>
      <td>${pill(r.kaynak)}</td>
      <td>${hedefPills}</td>
      <td>${tag}</td>
    </tr>`;
  }).join('');
  return `<div class="qref"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function renderChecklist(items) {
  return '<div class="check-grid">' +
    items.map((item, i) => `<div class="check-item"><span class="check-dot">${i+1}</span>${item}</div>`).join('') +
    '</div>';
}

function renderCiCards(cards) {
  return '<div class="ci-grid">' + cards.map(c =>
    `<div class="ci-card">
      <h3 style="color:${COLOR[c.titleColor]}">${c.titleIcon} ${c.title}</h3>
      <p>${c.description}</p>
      <pre>${esc(c.code)}</pre>
    </div>`
  ).join('') + '</div>';
}

function renderConflictSteps(steps) {
  return '<div class="conflict-steps">' + steps.map((s, i) =>
    `<div class="step-row">
      <span class="step-num">${i+1}</span>
      <div><div class="step-title">${s.title}</div><code class="step-code">${esc(s.code)}</code></div>
    </div>`
  ).join('') + '</div>';
}

const SVG_DIAGRAM = `<div class="flow-wrap"><svg class="flow-svg" viewBox="0 0 740 395" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="8" y="79" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3D5166" font-weight="600">master</text>
<text x="8" y="219" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3D5166" font-weight="600">develop</text>
<text x="8" y="324" font-family="'Courier New',Courier,monospace" font-size="10" fill="#3D5166" font-weight="600">branches</text>
<line x1="80" y1="75" x2="725" y2="75" stroke="#1E2A38" stroke-width="1" stroke-dasharray="5 4"/>
<line x1="80" y1="215" x2="725" y2="215" stroke="#1E2A38" stroke-width="1" stroke-dasharray="5 4"/>
<circle cx="100" cy="75" r="7" fill="#080C10" stroke="#A78BFA" stroke-width="2"/>
<line x1="107" y1="75" x2="601" y2="75" stroke="#A78BFA" stroke-width="2"/>
<circle cx="608" cy="75" r="7" fill="#080C10" stroke="#F87171" stroke-width="2.5"/>
<line x1="615" y1="75" x2="725" y2="75" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
<rect x="620" y="59" width="46" height="16" rx="8" fill="#1E1A00" stroke="#6B5900" stroke-width="0.8"/>
<text x="643" y="70.5" font-family="'Courier New',Courier,monospace" font-size="9" fill="#F0E68C" text-anchor="middle" font-weight="600">v1.2.1</text>
<circle cx="100" cy="215" r="7" fill="#080C10" stroke="#FB923C" stroke-width="2"/>
<line x1="107" y1="215" x2="293" y2="215" stroke="#FB923C" stroke-width="2"/>
<circle cx="300" cy="215" r="7" fill="#080C10" stroke="#FB923C" stroke-width="2"/>
<line x1="307" y1="215" x2="451" y2="215" stroke="#FB923C" stroke-width="2"/>
<circle cx="458" cy="215" r="7" fill="#080C10" stroke="#FB923C" stroke-width="2"/>
<line x1="465" y1="215" x2="500" y2="215" stroke="#FB923C" stroke-width="2"/>
<line x1="512" y1="215" x2="671" y2="215" stroke="#FB923C" stroke-width="2"/>
<circle cx="678" cy="215" r="7" fill="#080C10" stroke="#F87171" stroke-width="2" stroke-dasharray="3 2"/>

function render(d) {
  renderHero(d);
  const flowLabel   = currentLang === 'tr' ? 'Tam akış diyagramı'   : 'Full flow diagram';
  const branchLabel = currentLang === 'tr' ? 'Branch türleri'        : 'Branch types';
  const refLabel    = currentLang === 'tr' ? 'Hızlı başvuru'         : 'Quick reference';
  const conflLabel  = currentLang === 'tr' ? d.conflictTitle          : d.conflictTitle;
  document.getElementById('main').innerHTML =
    sec('var(--blue)',   flowLabel)   + SVG_DIAGRAM +
    sec('var(--green)',  branchLabel) + renderBranches(d.branches) +
    sec('var(--purple)', refLabel)    + renderQuickref(d.quickref) +
    sec('var(--red)',    d.checklistTitle) + renderChecklist(d.checklist) +
    sec('var(--amber)',  d.ciTitle) +
    `<div class="tip-bar"><span>💡</span><span>${d.tip}</span></div>` +
    renderCiCards(d.ciCards) +
    sec('var(--blue)',   d.conflictTitle) + renderConflictSteps(d.conflictSteps) +
    `<div class="note-bar"><span>⚠</span><span>${d.warning}</span></div>`;

  document.getElementById('back-label').textContent    = currentLang === 'tr' ? 'Ana Sayfa' : 'Home';
  document.getElementById('breadcrumb-parent').textContent = currentLang === 'tr' ? 'Teknik' : 'Technical';
  document.getElementById('footer-label').textContent  = currentLang === 'tr' ? 'Git Flow Referans Kartı · v1.0' : 'Git Flow Reference Card · v1.0';
  document.documentElement.lang = currentLang;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.lang === currentLang) return;
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    render(allData[currentLang]);
  });
});

fetch('../data/git-flow.json')
  .then(r => r.json())
  .then(data => { allData = data; render(data[currentLang]); });
</script>
